<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management System - Login</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #00bfff;
      font-family: "Microsoft Sans Serif", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-card {
      width: 500px;
      padding: 50px 60px;
      border: 1px solid #00bfff;
      border-radius: 6px;
      background-color: #0a0a0a;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.25);
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #00bfff;
      margin-bottom: 40px;
      line-height: 1.4;
    }

    .form-group {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .form-group label {
      width: 110px;
      flex-shrink: 0;
      color: #00bfff;
      font-size: 0.95rem;
    }

    .form-group input {
      flex: 1;
      padding: 8px 10px;
      background-color: #1a1a1a;
      border: 1px solid #00bfff;
      border-radius: 3px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: box-shadow 0.2s;
    }

    .form-group input:focus {
      box-shadow: 0 0 6px rgba(0, 191, 255, 0.6);
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 36px;
    }

    button {
      width: 110px;
      padding: 10px 0;
      border: 1px solid #00bfff;
      border-radius: 3px;
      background-color: #000;
      color: #00bfff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    button:hover {
      background-color: #00bfff;
      color: #000;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    .message.error {
      color: #ff4444;
    }

    .message.success {
      color: #44ff88;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Inventory Management System</h1>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password" />
      </div>

      <div class="btn-row">
        <button type="submit" id="btnLogin">Login</button>
        <button type="button" id="btnExit">Exit</button>
      </div>
    </form>

    <p class="message" id="message" role="alert" aria-live="polite"></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const messageEl = document.getElementById('message');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      // Do not trim password – leading/trailing whitespace may be intentional.
      const password = document.getElementById('password').value;

      messageEl.className = 'message';
      messageEl.textContent = '';

      if (!username || !password) {
        messageEl.classList.add('error');
        messageEl.textContent = 'Please enter both username and password.';
        return;
      }

      // NOTE: Credentials are checked here only for demonstration purposes.
      // In production, submit the form to a server-side endpoint and validate
      // credentials there – never expose authentication logic in client-side code.
      if (username === 'admin' && password === '123') {
        messageEl.classList.add('success');
        messageEl.textContent = 'Login successful. Redirecting to dashboard…';
        // Replace with the actual dashboard URL when available.
        // window.location.href = 'dashboard.html';
      } else {
        messageEl.classList.add('error');
        messageEl.textContent = 'Invalid username or password.';
      }
    });

    document.getElementById('btnExit').addEventListener('click', function () {
      // window.close() only works reliably for script-opened windows.
      // Attempt to close; if that is not possible, navigate back instead.
      if (window.opener || window.history.length <= 1) {
        window.close();
      } else {
        window.history.back();
      }
    });
  </script>
</body>
</html>
